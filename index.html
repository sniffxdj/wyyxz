<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>网易云音乐 · 极简版 | 随机背景</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    <style>
        /* ===== 基础重置 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary: #e84393;
            --primary-dark: #d6307a;
            --secondary: #0984e3;
            --bg-overlay: rgba(0, 0, 0, 0.6); /* 背景遮罩层，确保文字可读 */
            --card-bg: rgba(23, 29, 56, 0.85);
            --surface: rgba(33, 40, 74, 0.9);
            --text: #f0f0fa;
            --text-dim: #b0bedd;
            --border: #2e3d66;
            --shadow: 0 15px 30px -8px #000000cc;
            --radius-card: 24px;
            --radius-btn: 40px;
            --transition: 0.3s ease;
        }
        body {
            /* 背景将由JS动态设置，此处保留备用 */
            background: linear-gradient(145deg, #0b0b1f 0%, #121530 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            position: relative;
            transition: background-image 0.5s ease;
        }
        /* 背景遮罩层，确保内容清晰可见 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-overlay);
            z-index: -1;
            pointer-events: none;
        }
        /* 整体容器 */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 0.5rem 5rem;
            position: relative;
            z-index: 1;
        }
        /* 头部 - 仅保留图标 */
        .header { text-align: center; margin-bottom: 1.2rem; }
        .header h1 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a55cff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        /* 声明文字 */
        .disclaimer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin: 0.5rem 0 0.3rem 0;
            padding: 0.3rem;
            border-bottom: 1px dashed #33415c;
            border-top: 1px dashed #33415c;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
        }
        /* 联系方式图标 */
        .contact-icon {
            text-align: center;
            margin: 5px 0 15px 0;
        }
        .contact-icon a {
            display: inline-block;
            transition: transform 0.2s;
        }
        .contact-icon a:hover {
            transform: scale(1.1);
        }
        /* ===== 主布局 ===== */
        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            transition: all var(--transition);
            position: relative;
        }
        /* 左侧面板：桌面固定且可滚动 */
        .left-panel {
            width: 100%;
        }
        /* 右侧面板 */
        .right-panel {
            width: 100%;
            transition: transform var(--transition);
        }
        /* 桌面端样式 (宽度≥768px) */
        @media (min-width: 768px) {
            .main-layout {
                flex-direction: row;
                align-items: flex-start;
                gap: 2rem;
                min-height: 80vh;
            }
            .left-panel {
                width: 320px;
                flex-shrink: 0;
                position: sticky;
                top: 20px;
                align-self: flex-start;
                max-height: calc(100vh - 40px);
                overflow-y: auto;
                scrollbar-width: thin;
                padding-right: 5px;
            }
            .left-panel::-webkit-scrollbar {
                width: 5px;
                background: transparent;
            }
            .left-panel::-webkit-scrollbar-thumb {
                background: var(--primary);
                border-radius: 10px;
            }
            .right-panel {
                width: calc(100% - 340px);
                margin-left: auto;
                transform: translateX(100%);
                opacity: 0;
                transition: transform 0.4s ease, opacity 0.4s ease;
            }
            .right-panel.active {
                transform: translateX(0);
                opacity: 1;
            }
        }
        /* 移动端，左侧不固定 */
        @media (max-width: 767px) {
            .left-panel {
                position: relative;
                top: auto;
                max-height: none;
                overflow-y: visible;
            }
            .right-panel {
                transform: none;
                opacity: 1;
                transition: none;
            }
            .right-panel.active {
                transform: none;
            }
        }
        /* ===== 搜索卡片 ===== */
        .search-section {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 60px; padding: 0.3rem 0.3rem 0.3rem 0.8rem;
            border: 1px solid var(--border); margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .search-input {
            background: transparent; border: none; color: white;
            padding: 0.8rem 0; font-size: 1rem; width: 100%;
            outline: none;
        }
        .search-input::placeholder {
            color: var(--text-dim);
            opacity: 0.7;
        }
        .search-btn {
            background: linear-gradient(145deg, var(--primary), #b03a76); border: none;
            border-radius: 60px; padding: 0.8rem 1.5rem; font-weight: 600;
            color: white; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 6px 18px #b03a7680; transition: 0.15s; white-space: nowrap;
            cursor: pointer;
        }
        .search-btn:active { transform: scale(0.97); }
        .search-btn:disabled { opacity: 0.6; box-shadow: none; cursor: not-allowed; }
        .error-message { background: rgba(220,53,69,0.2); border-radius: 40px; padding: 0.6rem; color: #ffb0b0; display: none; font-size: 0.85rem; margin-top: 0.5rem; }
        .error-message.active { display: block; }

        /* ===== 热搜榜 ===== */
        .hot-trending {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: var(--radius-card); padding: 1rem 0.8rem;
            border: 1px solid var(--border);
        }
        .hot-header {
            display: flex; align-items: center; gap: 6px; color: var(--secondary);
            font-size: 1rem; font-weight: 600; margin-bottom: 0.8rem;
        }
        .hot-tags {
            display: flex; flex-wrap: wrap; gap: 0.5rem;
        }
        .hot-tag {
            background: rgba(232, 67, 147, 0.1); border: 1px solid var(--primary);
            border-radius: 30px; padding: 0.4rem 1rem; font-size: 0.85rem;
            color: var(--text); cursor: pointer; transition: 0.15s;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }
        .hot-tag:active {
            background: var(--primary); color: white; transform: scale(0.96);
        }

        /* ===== 搜索结果卡片 ===== */
        .results-section, .lyrics-section {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: var(--radius-card); padding: 1rem 0.8rem;
            border: 1px solid var(--border); margin-bottom: 1.2rem;
        }
        .section-title {
            font-size: 1.3rem; font-weight: 600; color: var(--secondary);
            display: flex; align-items: center; gap: 8px;
            border-left: 5px solid var(--primary); padding-left: 0.8rem; margin-bottom: 1rem;
        }
        .search-result-item {
            background: rgba(26, 34, 58, 0.7); border-radius: 20px;
            padding: 0.8rem; margin-bottom: 0.8rem; border: 1px solid #384e77;
            width: 100%;
        }
        .result-grid {
            display: grid;
            grid-template-columns: 70px 1fr;
            gap: 6px 8px;
            align-items: baseline;
        }
        .result-label {
            font-weight: 500; color: var(--text-dim); font-size: 0.85rem;
            white-space: nowrap;
        }
        .result-content {
            overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; font-size: 0.95rem; color: white;
            padding-bottom: 2px;
        }
        .result-content::-webkit-scrollbar { display: none; }
        .result-actions {
            grid-column: 1 / -1;
            display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end;
        }
        .btn-icon {
            background: rgba(255,255,255,0.05); border: 1px solid #5d73a3; border-radius: 40px;
            padding: 0.5rem 0.8rem; color: white; display: inline-flex; align-items: center;
            gap: 4px; font-size: 0.8rem; transition: 0.15s; flex: 1; justify-content: center;
            min-width: 0;
            cursor: pointer;
        }
        .btn-icon i { font-size: 0.9rem; }
        .btn-play { background: rgba(9,132,227,0.2); border-color: #0984e3; }
        .btn-play:active { background: #0984e3; }
        .no-results, .loading {
            background: #141e36; border-radius: 28px; padding: 2rem 1rem; text-align: center;
        }
        /* 歌词卡片 */
        .lyrics-section { display: none; }
        .lyrics-content {
            background: #0f1a2c; border-radius: 20px; padding: 1rem;
            color: #c9d5f0; font-size: 0.85rem; max-height: 160px; overflow-y: auto;
        }
        /* ===== 底部播放器 ===== */
        .player-sticky {
            position: fixed; bottom: 8px; left: 5px; right: 5px; z-index: 1000;
            display: flex; justify-content: center; pointer-events: none;
        }
        .player-card {
            background: rgba(12, 18, 34, 0.96); backdrop-filter: blur(16px);
            border-radius: 36px; border: 1px solid var(--primary);
            box-shadow: 0 12px 25px #000000, 0 0 0 1px #e8439340 inset;
            padding: 0.4rem 0.6rem; width: 100%; max-width: 520px;
            display: flex; align-items: center; gap: 6px; pointer-events: auto;
        }
        .player-cover { width: 34px; height: 34px; border-radius: 24px; border: 2px solid var(--primary); object-fit: cover; flex-shrink: 0; }
        .player-info-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
        .scrollable-text {
            overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; font-size: 0.8rem;
        }
        .scrollable-text::-webkit-scrollbar { display: none; }
        .player-song { font-weight: 700; color: white; }
        .player-artist { color: var(--text-dim); }
        .progress-area { display: flex; align-items: center; gap: 4px; margin-top: 2px; }
        .time-label { font-size: 0.55rem; color: var(--text-dim); min-width: 30px; font-variant-numeric: tabular-nums; }
        .custom-progress { flex: 1; height: 3px; background: #33415c; border-radius: 10px; position: relative; cursor: pointer; touch-action: none; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #f06292); border-radius: 10px; width: 0%; pointer-events: none; }
        .progress-thumb { position: absolute; width: 10px; height: 10px; background: white; border: 2px solid var(--primary); border-radius: 50%; top: 50%; transform: translate(-50%, -50%); left: 0%; pointer-events: none; box-shadow: 0 2px 6px black; }
        .player-controls { flex-shrink: 0; }
        .play-pause { background: var(--primary); border: none; border-radius: 30px; width: 36px; height: 36px; color: white; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px #b03a76; transition: 0.15s; cursor: pointer; }
        .play-pause:active { transform: scale(0.94); background: var(--primary-dark); }
        /* 底部声明已移除 */
        /* 模态框 */
        .quality-modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index:1200;
            align-items: center; justify-content: center;
        }
        .quality-modal.show { display: flex; }
        .modal-content-custom {
            background: #1a2140; border-radius: 32px; max-width:94%; width:440px;
            padding: 1.5rem 1.2rem; border:1px solid var(--primary);
            box-shadow:0 30px 60px black; max-height:90vh; overflow-y:auto;
        }
        .quality-option {
            background: #252f52; border:2px solid #3c4c77; border-radius:18px;
            padding:0.7rem 0.5rem; text-align:center; transition:0.1s;
        }
        .quality-option.selected { border-color:var(--primary); background:#382c4a; box-shadow:0 0 12px #e84393; }
        .quality-option .quality-name { font-weight:600; font-size:0.9rem; }
        .quality-option .quality-desc { font-size:0.65rem; color:#b9c4e6; }
        .btn-download-solid { background:var(--primary); border:none; border-radius:40px; padding:0.8rem 1.2rem; font-size:1rem; font-weight:600; width:100%; color:white; cursor: pointer; }
        .btn-download-solid:disabled { opacity:0.5; cursor: not-allowed; }
        .fallback-download { margin-top:1rem; padding:0.8rem; background:#0f1a2c; border-radius:20px; border:1px dashed #e84393; }
        .fallback-link-box { display:flex; gap:6px; align-items:center; background:#1d2b44; border-radius:60px; padding:0.2rem 0.2rem 0.2rem 0.8rem; }
        .fallback-link-box input { flex:1; background:transparent; border:none; color:white; font-size:0.7rem; min-width:0; }
        .copy-link-btn { background:var(--secondary); border:none; border-radius:40px; padding:0.4rem 0.8rem; color:white; font-size:0.7rem; white-space:nowrap; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 - 仅保留图标 -->
        <div class="header">
            <h1><i class="fas fa-headphones-alt me-2"></i> 极简·云音乐</h1>
        </div>

        <!-- 主布局容器 -->
        <div class="main-layout" id="mainLayout">
            <!-- 左侧面板 -->
            <div class="left-panel">
                <!-- 搜索卡片 -->
                <div class="search-section">
                    <input type="text" class="search-input" id="searchInput" placeholder="歌曲、歌手或专辑...">
                    <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> 搜索</button>
                </div>
                <div class="error-message" id="errorMessage"></div>

                <!-- 版权声明 -->
                <div class="disclaimer">
                    <i class="fas fa-info-circle me-1"></i> 所有内容来源自网络，如有侵权联系删除
                </div>

                <!-- 联系方式图标 -->
                <div class="contact-icon">
                    <a href="https://space.bilibili.com/269140788" target="_blank" rel="noopener noreferrer" title="B站主页">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 10C3 8.93913 3.42143 7.92172 4.17157 7.17157C4.92172 6.42143 5.93913 6 7 6H17C18.0609 6 19.0783 6.42143 19.8284 7.17157C20.5786 7.92172 21 8.93913 21 10V16C21 17.0609 20.5786 18.0783 19.8284 18.8284C19.0783 19.5786 18.0609 20 17 20H7C5.93913 20 4.92172 19.5786 4.17157 18.8284C3.42143 18.0783 3 17.0609 3 16V10Z" stroke="#E869A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                            <path d="M8 3L10 6" stroke="#E869A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                            <path d="M16 3L14 6" stroke="#E869A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                            <path d="M9 13V11" stroke="#E869A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                            <path d="M15 11V13" stroke="#E869A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        </svg>
                    </a>
                </div>

                <!-- 热搜卡片 -->
                <div class="hot-trending" id="hotTrendingSection">
                    <div class="hot-header">
                        <i class="fas fa-fire" style="color: #f39c12;"></i> 今日热搜
                    </div>
                    <div class="hot-tags" id="hotTagsContainer">
                        <span class="hot-tag">加载中...</span>
                    </div>
                </div>
            </div>

            <!-- 右侧面板 -->
            <div class="right-panel" id="rightPanel">
                <!-- 搜索结果卡片容器 -->
                <div class="results-section">
                    <div class="section-title"><i class="fas fa-list"></i> 搜索结果</div>
                    <div id="resultsContainer">
                        <div class="no-results" id="noResults" style="display: none;">
                            <i class="fas fa-search fa-2x mb-2 opacity-50"></i>
                            <p>输入关键词搜索</p>
                        </div>
                        <div class="loading" id="loading" style="display: none;">
                            <div class="spinner-border text-primary" style="width:2.5rem;height:2.5rem;"></div>
                            <p class="mt-2">搜索中...</p>
                        </div>
                        <div id="resultsList"></div>
                    </div>
                </div>
                <!-- 歌词卡片 -->
                <div class="lyrics-section" id="lyricsSection">
                    <div class="section-title"><i class="fas fa-file-lines"></i> 歌词</div>
                    <div class="lyrics-content" id="lyricsContent"></div>
                </div>
            </div>
        </div>

        <!-- 底部播放器 -->
        <div class="player-sticky" id="playerSection" style="display: none;">
            <div class="player-card">
                <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=100&h=100&fit=crop" class="player-cover" id="playerCover" alt="cover">
                <div class="player-info-wrap">
                    <div class="scrollable-text player-song" id="playerSongName">未知歌曲</div>
                    <div class="scrollable-text player-artist" id="playerArtist">未知歌手</div>
                    <div class="progress-area">
                        <span class="time-label" id="currentTime">0:00</span>
                        <div class="custom-progress" id="progressContainer">
                            <div class="progress-fill" id="progressFill"></div>
                            <div class="progress-thumb" id="progressThumb"></div>
                        </div>
                        <span class="time-label" id="duration">0:00</span>
                    </div>
                </div>
                <div class="player-controls">
                    <button class="play-pause" id="playPauseBtn"><i class="fas fa-play" id="playPauseIcon"></i></button>
                </div>
            </div>
            <audio id="audioPlayer" preload="metadata" style="display: none;"></audio>
        </div>
    </div>

    <!-- 音质选择模态框 -->
    <div class="quality-modal" id="qualityModal">
        <div class="modal-content-custom">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="text-primary fs-3 mb-0"><i class="fas fa-circle-notch me-2"></i>选择音质</h3>
                <button class="btn-close btn-close-white" id="closeModal"></button>
            </div>
            <div class="d-flex gap-3 mb-3 align-items-center">
                <img id="modalSongCover" class="rounded-4" style="width: 70px; height: 70px; object-fit: cover; border:2px solid var(--primary);" src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=200&h=200&fit=crop">
                <div>
                    <h4 id="modalSongName" class="fw-bold fs-5">歌曲名</h4>
                    <p id="modalSongArtist" class="text-secondary mb-0 small">歌手</p>
                    <p id="modalSongAlbum" class="text-secondary small">专辑</p>
                </div>
            </div>
            <div class="row g-2" id="qualityOptions"></div>
            <div class="mt-3">
                <button class="btn-download-solid" id="downloadActionBtn" disabled><i class="fas fa-download me-2"></i>开始下载</button>
            </div>
            <div class="fallback-download" id="fallbackArea" style="display: none;">
                <p class="small text-secondary mb-1"><i class="fas fa-exclamation-triangle me-1"></i> 复制链接手动下载</p>
                <div class="fallback-link-box">
                    <input type="text" id="fallbackLinkInput" readonly value="">
                    <button class="copy-link-btn" id="copyLinkBtn"><i class="fas fa-copy"></i> 复制</button>
                </div>
                <p class="small text-secondary mt-1">文件名: <span id="fallbackFileName"></span></p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // 立即设置随机背景图片（在DOM加载前开始请求）
            fetch('https://api.elaina.cat/random')
                .then(response => {
                    if (!response.ok) throw new Error('网络错误');
                    // 检查响应类型
                    const contentType = response.headers.get('content-type') || '';
                    if (contentType.includes('application/json')) {
                        // 如果是JSON，解析获取图片URL
                        return response.json().then(data => {
                            // 尝试常见的图片URL字段
                            return data.url || data.img || data.image || data.data?.url || null;
                        });
                    } else if (contentType.includes('image/')) {
                        // 如果是图片，直接使用响应URL
                        return response.url;
                    } else {
                        throw new Error('未知的响应格式');
                    }
                })
                .then(imageUrl => {
                    if (imageUrl) {
                        document.body.style.backgroundImage = `url('${imageUrl}')`;
                        document.body.style.backgroundSize = 'cover';
                        document.body.style.backgroundPosition = 'center';
                        document.body.style.backgroundRepeat = 'no-repeat';
                        document.body.style.backgroundAttachment = 'fixed';
                    } else {
                        // 保底背景
                        document.body.style.background = 'linear-gradient(145deg, #0b0b1f 0%, #121530 100%)';
                    }
                })
                .catch(err => {
                    console.warn('随机背景加载失败，使用默认背景', err);
                    document.body.style.background = 'linear-gradient(145deg, #0b0b1f 0%, #121530 100%)';
                });

            // ---------- 以下为原有功能代码，完全保留 ----------
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const noResults = document.getElementById('noResults');
            const loading = document.getElementById('loading');
            const resultsList = document.getElementById('resultsList');
            const rightPanel = document.getElementById('rightPanel');
            const qualityModal = document.getElementById('qualityModal');
            const closeModal = document.getElementById('closeModal');
            const modalSongCover = document.getElementById('modalSongCover');
            const modalSongName = document.getElementById('modalSongName');
            const modalSongArtist = document.getElementById('modalSongArtist');
            const modalSongAlbum = document.getElementById('modalSongAlbum');
            const qualityOptions = document.getElementById('qualityOptions');
            const downloadActionBtn = document.getElementById('downloadActionBtn');
            const lyricsSection = document.getElementById('lyricsSection');
            const lyricsContent = document.getElementById('lyricsContent');
            const errorMessage = document.getElementById('errorMessage');
            const hotTagsContainer = document.getElementById('hotTagsContainer');
            
            const playerSection = document.getElementById('playerSection');
            const playerCover = document.getElementById('playerCover');
            const playerSongName = document.getElementById('playerSongName');
            const playerArtist = document.getElementById('playerArtist');
            const audioPlayer = document.getElementById('audioPlayer');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const playPauseIcon = document.getElementById('playPauseIcon');
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const progressThumb = document.getElementById('progressThumb');
            const currentTimeSpan = document.getElementById('currentTime');
            const durationSpan = document.getElementById('duration');

            const fallbackArea = document.getElementById('fallbackArea');
            const fallbackLinkInput = document.getElementById('fallbackLinkInput');
            const copyLinkBtn = document.getElementById('copyLinkBtn');
            const fallbackFileName = document.getElementById('fallbackFileName');

            let currentSearchResults = [];
            let currentSelectedSong = null;
            let currentSelectedQuality = null;
            let currentDownloadUrl = null;
            let currentLyrics = '';
            let isSeeking = false;

            const qualityOptionsConfig = [
                { id: 'standard', name: '标准音质', desc: 'MP3 128k' },
                { id: 'lossless', name: '无损音质', desc: 'FLAC 16bit' },
                { id: 'hires', name: 'Hi-res', desc: '24bit 96kHz' },
                { id: 'sky', name: '沉浸环绕', desc: '360° 临场' },
                { id: 'jyeffect', name: '高清环绕', desc: '杜比全景声' },
                { id: 'jymaster', name: '超清母带', desc: '192kHz 母带' }
            ];

            function showError(msg) { errorMessage.textContent = msg; errorMessage.classList.add('active'); }
            function hideError() { errorMessage.classList.remove('active'); }
            function showLoading() {
                loading.style.display = 'block'; noResults.style.display = 'none';
                resultsList.innerHTML = ''; searchBtn.disabled = true;
                searchBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 搜索';
            }
            function hideLoading() {
                loading.style.display = 'none'; searchBtn.disabled = false;
                searchBtn.innerHTML = '<i class="fas fa-search"></i> 搜索';
            }
            function formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            async function loadHotSongs() {
                try {
                    const response = await fetch('https://api.suyanw.cn/api/musichotlist');
                    if (!response.ok) throw new Error('热搜加载失败');
                    const data = await response.json();
                    if (data.code === 1 && Array.isArray(data.data)) {
                        renderHotTags(data.data);
                    } else {
                        hotTagsContainer.innerHTML = '<span class="hot-tag">暂无热搜</span>';
                    }
                } catch (err) {
                    console.error('热搜接口错误:', err);
                    hotTagsContainer.innerHTML = '<span class="hot-tag">热搜加载失败</span>';
                }
            }

            function renderHotTags(songs) {
                if (!songs || songs.length === 0) {
                    hotTagsContainer.innerHTML = '<span class="hot-tag">暂无热搜</span>';
                    return;
                }
                let html = '';
                songs.forEach(item => {
                    const songName = item.songname || '未知歌曲';
                    const safeName = songName.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    html += `<span class="hot-tag" data-songname="${encodeURIComponent(songName)}">${safeName}</span>`;
                });
                hotTagsContainer.innerHTML = html;
                
                document.querySelectorAll('.hot-tag').forEach(tag => {
                    tag.addEventListener('click', (e) => {
                        const rawName = e.currentTarget.getAttribute('data-songname');
                        if (rawName) {
                            const songName = decodeURIComponent(rawName);
                            searchInput.value = songName;
                            performSearch();
                        }
                    });
                });
            }

            async function performSearch() {
                const query = searchInput.value.trim();
                if (!query) { showError('请输入搜索内容'); return; }
                showLoading(); hideError();
                try {
                    const res = await fetch(`https://www.cunyuapi.top/163music_search?name=${encodeURIComponent(query)}`);
                    if (!res.ok) throw new Error('网络错误');
                    const data = await res.json();
                    currentSearchResults = Array.isArray(data) ? data : [];
                    displayResults();

                    if (window.innerWidth >= 768) {
                        rightPanel.classList.add('active');
                    } else {
                        setTimeout(() => {
                            const resultsSection = document.querySelector('.results-section');
                            if (resultsSection) {
                                resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                        }, 200);
                    }
                } catch (err) {
                    showError('搜索失败: ' + err.message);
                    hideLoading();
                }
            }

            function displayResults() {
                hideLoading();
                if (currentSearchResults.length === 0) {
                    noResults.style.display = 'block';
                    resultsList.innerHTML = '';
                    noResults.innerHTML = `<i class="fas fa-music fa-2x mb-2 opacity-50"></i><p>没有找到歌曲</p>`;
                    return;
                }
                noResults.style.display = 'none';
                let html = '';
                currentSearchResults.forEach((song, idx) => {
                    const songName = (song.song_name || '未知').replace(/</g, '&lt;');
                    const artist = (song.singers || '未知').replace(/</g, '&lt;');
                    const album = (song.album || '未知').replace(/</g, '&lt;');
                    html += `
                        <div class="search-result-item" data-index="${idx}">
                            <div class="result-grid">
                                <span class="result-label">歌曲</span>
                                <span class="result-content scrollable-content">${songName}</span>
                                <span class="result-label">歌手</span>
                                <span class="result-content scrollable-content">${artist}</span>
                                <span class="result-label">专辑</span>
                                <span class="result-content scrollable-content">${album}</span>
                                <div class="result-actions">
                                    <button class="btn-icon btn-play" data-index="${idx}" title="试听"><i class="fas fa-play"></i> 试听</button>
                                    <button class="btn-icon" data-download="${idx}" title="下载"><i class="fas fa-download"></i> 下载</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                resultsList.innerHTML = html;
            }

            resultsList.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                e.preventDefault();
                const index = btn.getAttribute('data-index') || btn.getAttribute('data-download');
                if (index === null) return;
                if (btn.classList.contains('btn-play') || btn.querySelector('.fa-play')) {
                    playSongById(parseInt(index));
                } else {
                    openQualityModal(parseInt(index));
                }
            });

            function playSongById(idx) {
                const song = currentSearchResults[idx];
                if (!song) return;
                playerSection.style.display = 'flex';
                playerSongName.textContent = song.song_name || '未知歌曲';
                playerArtist.textContent = song.singers || '未知歌手';
                playPauseIcon.className = 'fas fa-play';
                progressFill.style.width = '0%'; progressThumb.style.left = '0%';
                currentTimeSpan.textContent = '0:00'; durationSpan.textContent = '0:00';
                fetch(`https://www.cunyuapi.top/163music_play?id=${song.id}&quality=standard`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.status === 200 && data.song_file_url) {
                            audioPlayer.src = data.song_file_url;
                            if (data.img) playerCover.src = data.img;
                            audioPlayer.load();
                            audioPlayer.play().then(() => playPauseIcon.className = 'fas fa-pause').catch(() => {});
                        } else alert('获取播放链接失败');
                    })
                    .catch(() => alert('播放出错'));
            }

            audioPlayer.addEventListener('loadedmetadata', () => {
                durationSpan.textContent = formatTime(audioPlayer.duration);
            });
            audioPlayer.addEventListener('timeupdate', () => {
                if (!isSeeking && audioPlayer.duration) {
                    const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                    progressFill.style.width = percent + '%';
                    progressThumb.style.left = percent + '%';
                    currentTimeSpan.textContent = formatTime(audioPlayer.currentTime);
                }
            });
            audioPlayer.addEventListener('ended', () => {
                playPauseIcon.className = 'fas fa-play';
                progressFill.style.width = '0%'; progressThumb.style.left = '0%';
                currentTimeSpan.textContent = '0:00';
            });
            playPauseBtn.addEventListener('click', () => {
                if (audioPlayer.paused) {
                    audioPlayer.play().then(() => playPauseIcon.className = 'fas fa-pause').catch(e => alert('无法播放'));
                } else {
                    audioPlayer.pause(); playPauseIcon.className = 'fas fa-play';
                }
            });

            progressContainer.addEventListener('touchstart', (e) => { e.preventDefault(); isSeeking = true; });
            progressContainer.addEventListener('touchmove', (e) => {
                e.preventDefault(); if (!audioPlayer.duration) return;
                const rect = progressContainer.getBoundingClientRect();
                let x = e.touches[0].clientX - rect.left;
                x = Math.max(0, Math.min(x, rect.width));
                const percent = (x / rect.width) * 100;
                progressFill.style.width = percent + '%';
                progressThumb.style.left = percent + '%';
                currentTimeSpan.textContent = formatTime((percent/100)*audioPlayer.duration);
            });
            progressContainer.addEventListener('touchend', (e) => {
                e.preventDefault(); if (!audioPlayer.duration) return;
                const rect = progressContainer.getBoundingClientRect();
                let x = e.changedTouches[0].clientX - rect.left;
                x = Math.max(0, Math.min(x, rect.width));
                const percent = (x / rect.width) * 100;
                audioPlayer.currentTime = (percent/100) * audioPlayer.duration;
                isSeeking = false;
            });
            progressContainer.addEventListener('mousedown', (e) => {
                isSeeking = true;
                const onMove = (e) => {
                    const rect = progressContainer.getBoundingClientRect();
                    let x = e.clientX - rect.left; x = Math.max(0, Math.min(x, rect.width));
                    const percent = (x / rect.width) * 100;
                    progressFill.style.width = percent + '%'; progressThumb.style.left = percent + '%';
                    if (audioPlayer.duration) currentTimeSpan.textContent = formatTime((percent/100)*audioPlayer.duration);
                };
                const onUp = (e) => {
                    const rect = progressContainer.getBoundingClientRect();
                    let x = e.clientX - rect.left; x = Math.max(0, Math.min(x, rect.width));
                    const percent = (x / rect.width) * 100;
                    if (audioPlayer.duration) audioPlayer.currentTime = (percent/100)*audioPlayer.duration;
                    isSeeking = false;
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });

            function openQualityModal(idx) {
                const song = currentSearchResults[idx];
                if (!song) return;
                currentSelectedSong = song; currentSelectedQuality = null;
                modalSongName.innerText = song.song_name || '未知';
                modalSongArtist.innerText = song.singers || '未知';
                modalSongAlbum.innerText = song.album || '未知';
                qualityOptions.innerHTML = '';
                qualityOptionsConfig.forEach(q => {
                    const col = document.createElement('div'); col.className = 'col-6 col-md-4';
                    const opt = document.createElement('div'); opt.className = 'quality-option';
                    opt.setAttribute('data-quality', q.id);
                    opt.innerHTML = `<div class="quality-name">${q.name}</div><div class="quality-desc">${q.desc}</div>`;
                    opt.addEventListener('click', () => {
                        document.querySelectorAll('.quality-option').forEach(el => el.classList.remove('selected'));
                        opt.classList.add('selected');
                        currentSelectedQuality = q.id;
                        downloadActionBtn.disabled = false;
                        fallbackArea.style.display = 'none';
                    });
                    col.appendChild(opt); qualityOptions.appendChild(col);
                });
                downloadActionBtn.disabled = true; downloadActionBtn.innerHTML = '<i class="fas fa-download me-2"></i>开始下载';
                fallbackArea.style.display = 'none'; qualityModal.classList.add('show');
            }
            closeModal.addEventListener('click', () => qualityModal.classList.remove('show'));
            copyLinkBtn.addEventListener('click', () => {
                fallbackLinkInput.select(); fallbackLinkInput.setSelectionRange(0,99999);
                navigator.clipboard?.writeText(fallbackLinkInput.value).then(() => alert('链接已复制')).catch(() => alert('链接已复制'));
            });

            function generateFileName(song, data) {
                const songName = (song.song_name || '未知歌曲').replace(/[/\\:*?"<>|]/g, '_');
                const artist = (song.singers || '未知歌手').replace(/[/\\:*?"<>|]/g, '_');
                let ext = '.mp3';
                if (data.type && data.type.includes('flac')) ext = '.flac';
                else if (data.song_file_url && data.song_file_url.includes('.flac')) ext = '.flac';
                return `${songName}-${artist}${ext}`;
            }
            async function startDownload() {
                if (!currentSelectedSong || !currentSelectedQuality) return;
                downloadActionBtn.disabled = true; downloadActionBtn.innerHTML = '<i class="fas fa-spinner fa-pulse me-2"></i>获取链接...';
                try {
                    const playUrl = `https://www.cunyuapi.top/163music_play?id=${currentSelectedSong.id}&quality=${currentSelectedQuality}`;
                    const resp = await fetch(playUrl); const data = await resp.json();
                    if (data.status !== 200) throw new Error('API错误');
                    if (data.img) modalSongCover.src = data.img;
                    currentDownloadUrl = data.song_file_url; currentLyrics = data.lyric || '';
                    const fileName = generateFileName(currentSelectedSong, data);
                    if (currentLyrics) { lyricsContent.textContent = currentLyrics; lyricsSection.style.display = 'block'; }
                    else lyricsSection.style.display = 'none';
                    fallbackLinkInput.value = currentDownloadUrl; fallbackFileName.innerText = fileName;
                    try {
                        downloadActionBtn.innerHTML = '<i class="fas fa-cloud-download-alt me-2"></i>准备下载...';
                        const fileResp = await fetch(currentDownloadUrl, { mode: 'cors', credentials: 'omit' });
                        if (!fileResp.ok) throw new Error('无法获取文件');
                        const blob = await fileResp.blob(); const blobUrl = window.URL.createObjectURL(blob);
                        const a = document.createElement('a'); a.href = blobUrl; a.download = fileName;
                        document.body.appendChild(a); a.click(); document.body.removeChild(a); window.URL.revokeObjectURL(blobUrl);
                        downloadActionBtn.innerHTML = '<i class="fas fa-check me-2"></i>下载已开始';
                        fallbackArea.style.display = 'none'; setTimeout(() => qualityModal.classList.remove('show'), 1500);
                    } catch (blobErr) {
                        downloadActionBtn.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i>自动下载失败';
                        fallbackArea.style.display = 'block'; downloadActionBtn.disabled = false;
                    }
                } catch (err) {
                    downloadActionBtn.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>请求失败';
                    fallbackArea.style.display = 'none';
                }
            }
            downloadActionBtn.addEventListener('click', startDownload);
            qualityModal.addEventListener('click', (e) => { if (e.target === qualityModal) qualityModal.classList.remove('show'); });

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => e.key === 'Enter' && performSearch());

            window.addEventListener('resize', () => {
                if (window.innerWidth < 768) {
                    rightPanel.classList.remove('active');
                }
            });

            loadHotSongs();
            searchInput.value = '';
        })();
    </script>
</body>
</html>
